[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[dev]
  command = "npm start"
  port = 8888
  targetPort = 3000
  publish = "public" # Points to public during local development to serve assets cleanly

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { path = ["^(?!/\\.netlify/functions).*$"] } # Protects serverless paths